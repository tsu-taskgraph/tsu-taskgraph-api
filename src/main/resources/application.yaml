spring:
  application:
    name: tsu-taskgraph-api

  datasource:
    url: jdbc:postgresql://localhost:5432/task-graph-bd
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
    default-schema: public

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Включает сохранение JWT токена при перезагрузке страницы Swagger в браузере
    persistAuthorization: true

jwt:
  secret: "bXktc3VwZXItc2VjcmV0LWtleS10YXNrZ3JhcGgtMjAyNC1zZWN1cmU="
  expiration:
    access: 900000     # 15 минут в миллисекундах
    refresh: 604800000 # 7 дней в миллисекундах