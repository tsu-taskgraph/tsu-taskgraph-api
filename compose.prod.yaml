services:
  postgres:
    image: postgres:16
    container_name: taskgraph_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - taskgraph_postgres_data:/var/lib/postgresql/data

  api:
    image: ${DOCKER_USERNAME}/tsu-taskgraph-api:latest
    container_name: taskgraph-api
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_STORAGE_LOCAL_DIR: ${APP_STORAGE_LOCAL_DIR}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:*}
      AI_BRIDGE_URL: ${AI_BRIDGE_URL}
      AI_BRIDGE_INTERNAL_SECRET: ${AI_BRIDGE_INTERNAL_SECRET}
    env_file:
      - .env

volumes:
  taskgraph_postgres_data: